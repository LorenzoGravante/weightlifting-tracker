<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Strength + CrossFit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080C14;
  --surface: #0D1525;
  --card: #111B2E;
  --border: #1E293B;
  --text: #E2E8F0;
  --muted: #64748B;
  --dim: #475569;
  --phase1: #3B82F6; --phase1-bg: #1E3A5F; --phase1-accent: #60A5FA;
  --phase2: #F97316; --phase2-bg: #431407; --phase2-accent: #FB923C;
  --phase3: #A855F7; --phase3-bg: #2E1065; --phase3-accent: #C084FC;
  --success: #22C55E; --warning: #F59E0B; --danger: #EF4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow Condensed', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
input, select, textarea, button { font-family: inherit; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { padding: 16px 16px 0; text-align: center; }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: 3px; }
.header .sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

.nav { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; }
.nav button {
  flex: 1; padding: 11px 2px; background: none; border: none;
  border-bottom: 2px solid transparent; color: var(--muted);
  cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  transition: all 0.15s;
}
.nav button.active { border-bottom-color: var(--phase-color); color: var(--phase-accent); }

.content { flex: 1; padding: 14px; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 12px;
}
.card-header { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 8px; }

.btn {
  display: block; width: 100%; padding: 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--phase-color); border-color: var(--phase-color); color: #fff; }
.btn-warning { background: #F59E0B18; border-color: #F59E0B50; color: var(--warning); }
.btn-danger { background: #EF444418; border-color: #EF444450; color: var(--danger); }
.btn-success { background: #22C55E18; border-color: #22C55E50; color: var(--success); }
.btn:disabled { opacity: 0.4; cursor: default; }

.input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: 6px;
  font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
  text-align: center;
}
.input:focus { outline: none; border-color: var(--phase-color); }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
}

.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--phase-color);
  color: var(--phase-accent); padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 700; z-index: 999; letter-spacing: 1px;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from { opacity:0; transform: translateX(-50%) translateY(-20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

.week-selector {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 14px;
}
.week-selector button {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); width: 32px; height: 32px; border-radius: 6px;
  cursor: pointer; font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.week-selector button:hover { border-color: var(--phase-color); color: var(--phase-accent); }

.phase-bar {
  text-align: center; padding: 8px; border-radius: 8px; margin-bottom: 12px;
  font-size: 11px; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;
}

.exercise-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.exercise-row:last-child { border-bottom: none; }

.set-grid { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 4px 6px; align-items: center; margin-top: 8px; }
.set-grid .label { font-size: 10px; color: var(--muted); text-align: center; font-weight: 700; letter-spacing: 1px; }

.collapsible-header {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; padding: 10px 0;
}
.collapsible-header:hover { opacity: 0.8; }

.progress-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 400px; width: 100%; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STRENGTH + CROSSFIT TRACKER — Single-file, localStorage, GitHub Pages
// ═══════════════════════════════════════════════════════════════════════════

// ─── Programme Constants ──────────────────────────────────────────────────
const DEFAULT_1RM = {
  power_clean: 70, back_squat: 120, deadlift: 160,
  military: 50, bench: 80, pull_ups: 20, dips: 20
};

const INCREMENTS = {
  power_clean: 1.25, back_squat: 2.5, deadlift: 2.5,
  military: 0.75, bench: 2.5, pull_ups: 1.0, dips: 1.0
};

const PHASE_CEIL = {
  power_clean: [0.80, 0.87, 0.88],
  back_squat:  [0.82, 0.92, 0.95],
  deadlift:    [0.83, 0.92, 0.95],
  military:    [0.80, 0.87, 0.88],
  bench:       [0.82, 0.92, 0.95],
  pull_ups:    [0.82, 0.92, 0.95],
  dips:        [0.82, 0.92, 0.95]
};

const PHASE_BANDS = {
  1: {
    A: { pct: [0.72, 0.75, 0.78, 0.72], sets: [4,4,5,3], reps: { power_clean:3, back_squat:5, military:5, pull_ups:5 }},
    B: { pct: [0.74, 0.77, 0.80, 0.72], sets: [4,4,5,3], reps: { deadlift:4, bench:5, dips:7 }}
  },
  2: {
    A: { pct: [0.83, 0.85, 0.88, 0.80], sets: [4,4,4,2], reps: { power_clean:2, back_squat:4, military:4, pull_ups:4 }},
    B: { pct: [0.78, 0.80, 0.82, 0.75], sets: [5,5,4,3], reps: { deadlift:4, bench:5, dips:7 }}
  },
  3: {
    A: { pct: [0.88, 0.90, 0.93, 0.85], sets: [4,3,3,2], reps: { power_clean:2, back_squat:3, military:3, pull_ups:3 }},
    B: { pct: [0.90, 0.92, 0.95, 0.85], sets: [3,3,2,2], reps: { deadlift:3, bench:3, dips:5 }}
  }
};

// Toes to bar: bodyweight, reps progression
const T2B_REPS = {
  A: [10,11,13,10, 12,14,16,10, 15,17,20,20],
  B: [10,11,12,8,  11,13,15,8,  14,16,18,18]
};
const T2B_SETS = [3,3,3,2, 3,3,3,2, 3,3,3,2];

const DELOAD_WEEKS = [4, 8, 12];

const PHASES = [
  { id:1, name:"Accumulation", weeks:[1,2,3,4], color:"var(--phase1)", bg:"var(--phase1-bg)", accent:"var(--phase1-accent)", rawColor:"#3B82F6", rawAccent:"#60A5FA", intensity:"70–80% 1RM", rpe:"RPE 7" },
  { id:2, name:"Intensification", weeks:[5,6,7,8], color:"var(--phase2)", bg:"var(--phase2-bg)", accent:"var(--phase2-accent)", rawColor:"#F97316", rawAccent:"#FB923C", intensity:"80–90% 1RM", rpe:"RPE 8" },
  { id:3, name:"Peaking", weeks:[9,10,11,12], color:"var(--phase3)", bg:"var(--phase3-bg)", accent:"var(--phase3-accent)", rawColor:"#A855F7", rawAccent:"#C084FC", intensity:"87–97% 1RM", rpe:"RPE 9" }
];

const SESSION_A_EXERCISES = [
  { ex:"power_clean", label:"Power Clean", notes:"Full catch, elbows high, reset each rep" },
  { ex:"back_squat", label:"Back Squat", notes:"Brace, bar on traps, knees track toes" },
  { ex:"military", label:"Military Press", notes:"No leg drive, elbows forward, lock out" },
  { ex:"pull_ups", label:"Weighted Pull-ups", notes:"Full ROM, pause at top, controlled descent" },
  { ex:"toes_bar", label:"Toes to Bar", notes:"Kip from shoulders, bodyweight only — progress reps", isBodyweight: true }
];

const SESSION_B_EXERCISES = [
  { ex:"deadlift", label:"Deadlift", notes:"Hip hinge, lats engaged, bar drags shins" },
  { ex:"bench", label:"Bench Press", notes:"Retract scapula, bar to sternum, leg drive" },
  { ex:"dips", label:"Weighted Dips", notes:"Forward lean = chest; upright = triceps" },
  { ex:"toes_bar_b", label:"Toes to Bar", notes:"Controlled eccentric, full hip flexion", isBodyweight: true }
];

const PLANB_EXERCISES = [
  { ex:"power_clean", label:"Power Clean", notes:"Focus on technique — lighter load" },
  { ex:"back_squat", label:"Back Squat", notes:"Reduce by 1 set vs Session A" },
  { ex:"bench", label:"Bench Press", notes:"Moderate intensity" },
  { ex:"pull_ups", label:"Weighted Pull-ups", notes:"Controlled tempo" },
  { ex:"toes_bar", label:"Toes to Bar", notes:"Bodyweight, moderate reps", isBodyweight: true }
];

const WARMUP = {
  A: "5 min row/bike → 10 hip circles/side → 10 leg swings/side → 5 Cossack squats/side → 3×3 muscle clean (empty bar) → 3×3 front squat (empty bar) → Build to working weight in 3-4 sets",
  B: "5 min row/bike → Cat-cow ×10 → Band pull-aparts ×15 → 10 RDLs (empty bar) → 3×5 bench press (empty bar) → Build to working weight in 3-4 sets",
  PlanB: "5 min row/bike → Full body mobility flow ×5 min → 3×3 muscle clean + front squat (empty bar) → Build to working weight in 3 sets"
};

const COOLDOWN = {
  A: "Hip flexor stretch 60s/side → Hamstring stretch 60s/side → Thoracic spine foam roll 2 min → Banded shoulder distraction 45s/side",
  B: "Lat stretch 60s/side → Chest opener on foam roller 90s → Glute stretch 60s/side → Wrist circles + flexor stretch 45s/side",
  PlanB: "Full body: hip flexors, hamstrings, lats, chest opener — 45s each side → Thoracic foam roll 2 min"
};

// ─── Utility ──────────────────────────────────────────────────────────────
function r(val, step=2.5) { return Math.round(val / step) * step; }
function r1(val) { return Math.round(val / 1.25) * 1.25; }
function getPhase(week) { return PHASES.find(p => p.weeks.includes(week)) || PHASES[0]; }
function getStep(ex) { return ex.includes("pull_ups") || ex.includes("dips") || ex.includes("military") ? 1.25 : 2.5; }
function getBaseEx(ex) {
  if (ex === "toes_bar" || ex === "toes_bar_b") return null;
  return ex;
}

// ─── Storage ──────────────────────────────────────────────────────────────
const STORE_PREFIX = "scf_";
function loadData(key, fallback) {
  try {
    const raw = localStorage.getItem(STORE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveData(key, val) {
  try { localStorage.setItem(STORE_PREFIX + key, JSON.stringify(val)); }
  catch(e) { console.error("Storage error:", e); }
}

// ─── Adaptive Progression Engine ──────────────────────────────────────────
function computeAdaptiveWeight(ex, targetWeek, sessionType, allLogs, base1rm) {
  const baseEx = getBaseEx(ex);
  if (!baseEx) return null; // T2B is bodyweight

  const phase = getPhase(targetWeek);
  const isDeload = DELOAD_WEEKS.includes(targetWeek);
  const weekInPhase = phase.weeks.indexOf(targetWeek);
  const bandKey = sessionType === "PlanB" ? "A" : sessionType;
  const band = PHASE_BANDS[phase.id]?.[bandKey];
  if (!band) return r(base1rm[baseEx] * 0.72, getStep(ex));

  const pct = band.pct[weekInPhase] || band.pct[0];
  const oneRM = base1rm[baseEx] || DEFAULT_1RM[baseEx] || 80;
  const step = getStep(ex);
  const inc = INCREMENTS[baseEx] || 2.5;

  if (isDeload || targetWeek === 1) {
    return r(oneRM * pct, step);
  }

  // Find last logged weight for this exercise
  let lastWeight = null, lastRPEAvg = null, lastAllComplete = null;
  for (let w = targetWeek - 1; w >= 1; w--) {
    for (const t of ["A", "B", "PlanB"]) {
      const log = allLogs[`w${w}_${t}`];
      if (!log?.completed) continue;
      const sets = log.sets?.[ex] || [];
      const weights = sets.map(s => parseFloat(s.weight) || 0).filter(v => v > 0);
      if (weights.length === 0) continue;
      if (lastWeight === null) {
        lastWeight = Math.max(...weights);
        const rpes = sets.map(s => parseFloat(s.rpe) || 0).filter(v => v > 0);
        lastRPEAvg = rpes.length ? rpes.reduce((a,b) => a+b, 0) / rpes.length : 7.5;
        lastAllComplete = sets.every(s => parseInt(s.reps) > 0);
      }
    }
    if (lastWeight !== null) break;
  }

  // Two consecutive holds → deload 5%
  let holdCount = 0, prevW = null;
  for (let w = targetWeek - 1; w >= Math.max(1, targetWeek - 3); w--) {
    for (const t of ["A", "B", "PlanB"]) {
      const log = allLogs[`w${w}_${t}`];
      if (!log?.completed) continue;
      const sets = log.sets?.[ex] || [];
      const weights = sets.map(s => parseFloat(s.weight) || 0).filter(v => v > 0);
      if (!weights.length) continue;
      const topW = Math.max(...weights);
      if (prevW === null) { prevW = topW; continue; }
      if (topW === prevW) holdCount++;
    }
    if (holdCount >= 2) break;
  }

  if (lastWeight === null) return r(oneRM * pct, step);

  let newWeight;
  if (holdCount >= 2) newWeight = r(lastWeight * 0.95, step);
  else if (!lastAllComplete || lastRPEAvg >= 8.5) newWeight = lastWeight;
  else if (lastRPEAvg <= 7.0) newWeight = lastWeight + inc * 2;
  else newWeight = lastWeight + inc;

  // Phase ceiling
  const ceilArr = PHASE_CEIL[baseEx] || [0.82, 0.92, 0.95];
  const ceil = ceilArr[phase.id - 1] || 0.95;
  return Math.min(r(newWeight, step), r(oneRM * ceil, step));
}

function getSessionExercises(type) {
  if (type === "A") return SESSION_A_EXERCISES;
  if (type === "B") return SESSION_B_EXERCISES;
  return PLANB_EXERCISES;
}

function getPlannedSets(ex, week, sessionType, allLogs, base1rm) {
  const phase = getPhase(week);
  const weekInPhase = phase.weeks.indexOf(week);
  const bandKey = sessionType === "PlanB" ? "A" : sessionType;
  const band = PHASE_BANDS[phase.id]?.[bandKey];

  if (ex.ex === "toes_bar" || ex.ex === "toes_bar_b") {
    const tbKey = ex.ex === "toes_bar" ? "A" : "B";
    const reps = T2B_REPS[tbKey][week - 1] || 10;
    const numSets = T2B_SETS[week - 1] || 3;
    const sets = [];
    for (let i = 0; i < numSets; i++) {
      sets.push({ weight: "BW", reps: String(reps), rpe: "7" });
    }
    return sets;
  }

  const weight = computeAdaptiveWeight(ex.ex, week, sessionType, allLogs, base1rm);
  const baseEx = getBaseEx(ex.ex) || ex.ex;
  const reps = band?.reps?.[baseEx] || 5;
  const numSets = band?.sets?.[weekInPhase] || 4;
  const sets = [];
  for (let i = 0; i < numSets; i++) {
    sets.push({ weight: String(weight), reps: String(reps), rpe: DELOAD_WEEKS.includes(week) ? "6" : phase.rpe.replace("RPE ", "") });
  }
  return sets;
}

// ─── State ────────────────────────────────────────────────────────────────
let state = {
  tab: "schedule",
  week: loadData("week", 1),
  logs: loadData("logs", {}),
  prs: loadData("prs", {}),
  base1rm: loadData("base1rm", { ...DEFAULT_1RM }),
  cycle: loadData("cycle", 1),
  activeSession: null, // { week, type }
  reviewing: null,     // log key being reviewed
  toast: null,
  toastTimeout: null,
  cfYesterday: false,
  confirmReset: false,
  draftLog: null,      // in-progress session edits
  expandedWarmup: false,
  expandedCooldown: false
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function showToast(msg) {
  if (state.toastTimeout) clearTimeout(state.toastTimeout);
  state.toast = msg;
  state.toastTimeout = setTimeout(() => { state.toast = null; render(); }, 2500);
  render();
}

function persist() {
  saveData("week", state.week);
  saveData("logs", state.logs);
  saveData("prs", state.prs);
  saveData("base1rm", state.base1rm);
  saveData("cycle", state.cycle);
}

// ─── Render Engine ────────────────────────────────────────────────────────
function render() {
  const phase = getPhase(state.week);
  const isDeload = DELOAD_WEEKS.includes(state.week);
  const app = document.getElementById("app");

  // Set CSS custom properties for current phase
  document.documentElement.style.setProperty("--phase-color", phase.rawColor);
  document.documentElement.style.setProperty("--phase-accent", phase.rawAccent);

  let html = "";

  // Toast
  if (state.toast) {
    html += `<div class="toast">${state.toast}</div>`;
  }

  // If actively logging
  if (state.activeSession) {
    html += renderLogger(phase, isDeload);
    app.innerHTML = html;
    attachLoggerEvents();
    return;
  }

  // If reviewing a log
  if (state.reviewing) {
    html += renderReview(phase);
    app.innerHTML = html;
    attachReviewEvents();
    return;
  }

  // Header
  html += `
    <div class="header">
      <h1 style="color:${phase.rawAccent}">STRENGTH + CF</h1>
      <div class="sub">CYCLE ${state.cycle} · ${phase.name.toUpperCase()} · ${phase.intensity}</div>
    </div>
  `;

  // Nav
  const tabs = [
    ["schedule", "Schedule"],
    ["log", "History"],
    ["progress", "Progress"],
    ["settings", "Settings"]
  ];
  html += `<div class="nav">`;
  for (const [id, label] of tabs) {
    html += `<button class="${state.tab === id ? "active" : ""}" onclick="setState({tab:'${id}'})">${label.toUpperCase()}</button>`;
  }
  html += `</div>`;

  html += `<div class="content">`;

  if (state.tab === "schedule") html += renderSchedule(phase, isDeload);
  else if (state.tab === "log") html += renderLogHistory(phase);
  else if (state.tab === "progress") html += renderProgress(phase);
  else if (state.tab === "settings") html += renderSettings(phase);

  html += `</div>`;

  app.innerHTML = html;

  if (state.tab === "progress") drawCharts(phase);
}

// ─── Schedule Tab ─────────────────────────────────────────────────────────
function renderSchedule(phase, isDeload) {
  let h = "";

  // Week selector
  h += `<div class="week-selector">
    <button onclick="setState({week: Math.max(1, state.week-1)})">‹</button>
    <div style="text-align:center">
      <div style="font-size:22px; font-weight:800; color:${phase.rawAccent}">WEEK ${state.week}</div>
      <div style="font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace">${phase.name} · ${isDeload ? "DELOAD" : phase.intensity}</div>
    </div>
    <button onclick="setState({week: Math.min(12, state.week+1)})">›</button>
  </div>`;

  // Phase progress bar
  const weekProgress = ((state.week) / 12) * 100;
  h += `<div style="margin-bottom:14px">
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${weekProgress}%; background:${phase.rawColor}"></div></div>
    <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace">
      <span>W1</span><span>ACCUM</span><span>INTENS</span><span>PEAK</span><span>W12</span>
    </div>
  </div>`;

  if (isDeload) {
    h += `<div class="card" style="border-color:${phase.rawColor}40; background:linear-gradient(135deg,${phase.rawColor}08,var(--card))">
      <div style="font-size:12px; color:${phase.rawAccent}; font-weight:700; letter-spacing:1px">⚡ DELOAD WEEK</div>
      <div style="font-size:12px; color:var(--muted); margin-top:4px">Same weights, reduced volume (−40% sets). Focus on movement quality and recovery.</div>
    </div>`;
  }

  // Session cards
  const sessions = [
    { type: "A", label: "SESSION A", desc: "Squat + Press + Olympic" },
    { type: "B", label: "SESSION B", desc: "Deadlift + Bench + Dips" },
    { type: "PlanB", label: "PLAN B (single session)", desc: "Full body — when you can only train once" }
  ];

  for (const s of sessions) {
    const logKey = `w${state.week}_${s.type}`;
    const log = state.logs[logKey];
    const completed = log?.completed;
    const draft = log && !log.completed;

    h += `<div class="card" style="cursor:pointer; ${completed ? "border-color:var(--success); opacity:0.8" : ""}" onclick="startSession(${state.week}, '${s.type}')">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div>
          <div style="font-size:15px; font-weight:800; color:${completed ? "var(--success)" : phase.rawAccent}">${s.label}</div>
          <div style="font-size:11px; color:var(--muted)">${s.desc}</div>
        </div>
        <div>
          ${completed ? '<span class="badge" style="background:var(--success); color:#000">DONE ✓</span>'
            : draft ? '<span class="badge" style="background:var(--warning); color:#000">DRAFT</span>'
            : '<span class="badge" style="background:var(--border); color:var(--muted)">START →</span>'}
        </div>
      </div>`;

    // Show planned exercises preview
    const exercises = getSessionExercises(s.type);
    h += `<div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:4px">`;
    for (const ex of exercises) {
      const planned = getPlannedSets(ex, state.week, s.type, state.logs, state.base1rm);
      const displayWeight = ex.isBodyweight ? "BW" : `${planned[0]?.weight || "?"}kg`;
      h += `<span style="font-size:10px; color:var(--dim); background:var(--bg); padding:2px 6px; border-radius:3px">${ex.label}: ${planned.length}×${planned[0]?.reps || "?"} @ ${displayWeight}</span>`;
    }
    h += `</div></div>`;
  }

  // Overview grid
  h += `<div class="card">
    <div class="card-header" style="color:${phase.rawAccent}">THIS WEEK'S TARGETS</div>`;

  const allEx = [...SESSION_A_EXERCISES, ...SESSION_B_EXERCISES.filter(e => e.ex !== "toes_bar_b")];
  h += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:6px">`;
  for (const ex of allEx) {
    if (ex.isBodyweight) {
      const reps = T2B_REPS.A[state.week - 1] || 10;
      h += `<div style="background:var(--bg); padding:8px; border-radius:6px">
        <div style="font-size:11px; color:var(--muted)">${ex.label}</div>
        <div style="font-size:18px; font-weight:800; color:var(--text)">${reps} reps</div>
        <div style="font-size:10px; color:var(--dim)">bodyweight</div>
      </div>`;
    } else {
      const type = SESSION_A_EXERCISES.find(e => e.ex === ex.ex) ? "A" : "B";
      const weight = computeAdaptiveWeight(ex.ex, state.week, type, state.logs, state.base1rm);
      const pctOf1RM = state.base1rm[ex.ex] ? Math.round((weight / state.base1rm[ex.ex]) * 100) : "?";
      h += `<div style="background:var(--bg); padding:8px; border-radius:6px">
        <div style="font-size:11px; color:var(--muted)">${ex.label}</div>
        <div style="font-size:18px; font-weight:800; color:var(--text)">${weight} kg</div>
        <div style="font-size:10px; color:var(--dim)">${pctOf1RM}% of 1RM</div>
      </div>`;
    }
  }
  h += `</div></div>`;

  return h;
}

// ─── Logger ───────────────────────────────────────────────────────────────
function startSession(week, type) {
  const logKey = `w${week}_${type}`;
  const existing = state.logs[logKey];
  const exercises = getSessionExercises(type);

  let draftLog;
  if (existing) {
    draftLog = JSON.parse(JSON.stringify(existing));
  } else {
    draftLog = { completed: false, date: new Date().toISOString().slice(0, 10), energy: "", notes: "", cfYesterday: false, sets: {} };
    for (const ex of exercises) {
      draftLog.sets[ex.ex] = getPlannedSets(ex, week, type, state.logs, state.base1rm);
    }
  }

  state.activeSession = { week, type };
  state.draftLog = draftLog;
  state.expandedWarmup = false;
  state.expandedCooldown = false;
  state.cfYesterday = draftLog.cfYesterday || false;
  render();
}

function renderLogger(phase, isDeload) {
  const { week, type } = state.activeSession;
  const log = state.draftLog;
  const exercises = getSessionExercises(type);
  const sessionLabel = type === "PlanB" ? "PLAN B" : `SESSION ${type}`;

  let h = `<div style="padding:14px; max-width:520px; margin:0 auto">`;

  // Header
  h += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
    <button class="btn" style="width:auto; padding:8px 14px; font-size:12px" onclick="closeLogger()">← BACK</button>
    <div style="text-align:right">
      <div style="font-size:16px; font-weight:800; color:${phase.rawAccent}">W${week} ${sessionLabel}</div>
      <div style="font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace">${phase.name} · ${isDeload ? "DELOAD" : phase.intensity}</div>
    </div>
  </div>`;

  // CF yesterday toggle
  h += `<div class="card" style="padding:10px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; ${state.cfYesterday ? "border-color:var(--warning)" : ""}" onclick="toggleCF()">
    <div>
      <div style="font-size:12px; font-weight:700; color:${state.cfYesterday ? "var(--warning)" : "var(--muted)"}">CrossFit yesterday?</div>

  // Warmup card
  const warmupKey = type === "PlanB" ? "PlanB" : type;

    ${state.expandedWarmup ? `<div style="font-size:12px; color:var(--muted); line-height:1.6; padding-top:6px">${WARMUP[warmupKey]}</div>` : ""}

      <div class="label">${ex.isBodyweight ? "" : "KG"}</div>
      <div class="label">REPS</div>

      } else {

  // Action buttons
  h += `<div style="display:flex; gap:8px; margin-bottom:20px">
    <button class="btn btn-warning" style="flex:1" onclick="saveDraft()">SAVE DRAFT</button>

}

function attachLoggerEvents() {
  // Notes textarea sync
  const notes = document.getElementById("session-notes");
  if (notes) {
    notes.addEventListener("input", (e) => { state.draftLog.notes = e.target.value; });
  }
}

function updateSet(exIdx, exKey, setIdx, field, value) {
  if (!state.draftLog) return;
  if (!state.draftLog.sets[exKey]) return;
  state.draftLog.sets[exKey][setIdx][field] = value;
}

function toggleCF() {
  state.cfYesterday = !state.cfYesterday;
  if (state.draftLog) state.draftLog.cfYesterday = state.cfYesterday;
  render();
}

function saveDraft() {
  const { week, type } = state.activeSession;
  const logKey = `w${week}_${type}`;
  state.draftLog.completed = false;
  state.draftLog.date = state.draftLog.date || new Date().toISOString().slice(0, 10);
  state.logs[logKey] = JSON.parse(JSON.stringify(state.draftLog));
  persist();
  showToast("Draft saved");
}

function completeSession() {
  const { week, type } = state.activeSession;
  const logKey = `w${week}_${type}`;
  state.draftLog.completed = true;
  state.draftLog.date = state.draftLog.date || new Date().toISOString().slice(0, 10);
  state.logs[logKey] = JSON.parse(JSON.stringify(state.draftLog));

  // PR detection
  const exercises = getSessionExercises(type);
  for (const ex of exercises) {
    if (ex.isBodyweight) continue;
    const sets = state.draftLog.sets[ex.ex] || [];
    for (const s of sets) {
      const w = parseFloat(s.weight) || 0;
      if (w > 0 && (!state.prs[ex.ex] || w > state.prs[ex.ex].weight)) {
        state.prs[ex.ex] = { weight: w, week, type, date: state.draftLog.date };
        showToast(`🏆 NEW PR: ${ex.label} — ${w}kg!`);
      }
    }
  }

  persist();
  state.activeSession = null;
  state.draftLog = null;
  showToast("Session logged ✓");
}

function closeLogger() {
  state.activeSession = null;
  state.draftLog = null;
  render();
}

// ─── Review Mode ──────────────────────────────────────────────────────────
function renderReview(phase) {
  const key = state.reviewing;

  const match = key.match(/w(\d+)_(A|B|PlanB)/);

    h += `<div class="card" style="padding:8px 14px; border-color:var(--warning)">

      <div class="set-grid">
        <div class="label"></div><div class="label">${ex.isBodyweight ? "" : "KG"}</div><div class="label">REPS</div><div class="label">RPE</div>`;

      h += `<div style="font-size:14px; font-weight:700; text-align:center; color:var(--text)">${set.reps}</div>`;
      h += `<div style="font-size:14px; font-weight:700; text-align:center; color:${rpeColor(set.rpe)}">${set.rpe}</div>`;

      <div style="font-size:13px; color:var(--text); line-height:1.5">${log.notes}</div>

  }

  h += `</div>`;
  return h;

function attachReviewEvents() {}

function rpeColor(rpe) {
  const v = parseFloat(rpe) || 7;
  if (v <= 6.5) return "#22C55E";
  if (v <= 7.5) return "#84CC16";
  if (v <= 8) return "#F97316";
  if (v <= 8.5) return "#EF4444";
  return "#B91C1C";
}

// ─── Progress Tab ─────────────────────────────────────────────────────────
function renderProgress(phase) {
  let h = `<div class="card-header" style="color:${phase.rawAccent}">PROGRESS</div>`;

  const exercises = [
    { ex: "power_clean", label: "Power Clean" },
    { ex: "back_squat", label: "Back Squat" },
    { ex: "deadlift", label: "Deadlift" },
    { ex: "military", label: "Military Press" },
    { ex: "bench", label: "Bench Press" },
    { ex: "pull_ups", label: "Weighted Pull-ups" },
    { ex: "dips", label: "Weighted Dips" }
  ];

  for (const ex of exercises) {
    // Gather logged weights by week
    const data = [];
    for (let w = 1; w <= 12; w++) {
      for (const t of ["A", "B", "PlanB"]) {
        const log = state.logs[`w${w}_${t}`];
        if (!log?.completed) continue;
        const sets = log.sets?.[ex.ex] || [];
        const maxW = Math.max(0, ...sets.map(s => parseFloat(s.weight) || 0));
        if (maxW > 0) data.push({ week: w, weight: maxW });
      }
    }

    const baseline = state.base1rm[ex.ex] || DEFAULT_1RM[ex.ex];
    const best = data.length ? Math.max(...data.map(d => d.weight)) : 0;
    const pctOfBaseline = best > 0 ? Math.round((best / baseline) * 100) : 0;

    h += `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
        <div style="font-size:14px; font-weight:700; color:${phase.rawAccent}">${ex.label}</div>
        <div style="font-size:11px; color:var(--muted)">1RM: ${baseline}kg · Best: ${best > 0 ? best + "kg" : "—"}</div>
      </div>
      ${best > 0 ? `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(pctOfBaseline, 100)}%; background:${phase.rawColor}"></div></div>
      <div style="font-size:10px; color:var(--dim); margin-top:2px; text-align:right">${pctOfBaseline}% of baseline 1RM</div>` : ""}
      <canvas id="chart_${ex.ex}" width="460" height="80" style="width:100%; height:80px; margin-top:6px"></canvas>
    </div>`;
  }

  return h;
}

function drawCharts(phase) {
  const exercises = ["power_clean", "back_squat", "deadlift", "military", "bench", "pull_ups", "dips"];

  for (const ex of exercises) {
    const canvas = document.getElementById(`chart_${ex}`);
    if (!canvas) continue;
    const ctx = canvas.getContext("2d");
    const w = canvas.width = canvas.offsetWidth * 2;
    const h = canvas.height = 160;
    ctx.clearRect(0, 0, w, h);

    // Gather data
    const data = [];
    for (let wk = 1; wk <= 12; wk++) {
      let maxW = 0;
      for (const t of ["A", "B", "PlanB"]) {
        const log = state.logs[`w${wk}_${t}`];
        if (!log?.completed) continue;
        const sets = log.sets?.[ex] || [];
        const top = Math.max(0, ...sets.map(s => parseFloat(s.weight) || 0));
        if (top > maxW) maxW = top;
      }
      data.push({ week: wk, weight: maxW });
    }

    const hasData = data.some(d => d.weight > 0);
    if (!hasData) {
      ctx.fillStyle = "#475569";
      ctx.font = "22px 'Barlow Condensed'";
      ctx.textAlign = "center";
      ctx.fillText("No data yet", w / 2, h / 2 + 8);
      continue;
    }

    const weights = data.filter(d => d.weight > 0).map(d => d.weight);
    const minW = Math.min(...weights) * 0.9;
    const maxW = Math.max(...weights) * 1.05;
    const padX = 30, padY = 16;
    const plotW = w - padX * 2, plotH = h - padY * 2;

    // Grid lines
    ctx.strokeStyle = "#1E293B";
    ctx.lineWidth = 1;
    for (let i = 0; i <= 3; i++) {
      const y = padY + (plotH / 3) * i;
      ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(w - padX, y); ctx.stroke();
    }

    // Line + dots
    ctx.strokeStyle = phase.rawColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    let first = true;
    for (const d of data) {
      if (d.weight === 0) continue;
      const x = padX + ((d.week - 1) / 11) * plotW;
      const y = padY + plotH - ((d.weight - minW) / (maxW - minW)) * plotH;
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Dots
    ctx.fillStyle = phase.rawAccent;
    for (const d of data) {
      if (d.weight === 0) continue;
      const x = padX + ((d.week - 1) / 11) * plotW;
      const y = padY + plotH - ((d.weight - minW) / (maxW - minW)) * plotH;
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    }

    // Week labels
    ctx.fillStyle = "#475569";
    ctx.font = "18px 'JetBrains Mono'";
    ctx.textAlign = "center";
    for (let wk = 1; wk <= 12; wk += 2) {
      const x = padX + ((wk - 1) / 11) * plotW;
      ctx.fillText(`${wk}`, x, h - 2);
    }
  }
}

    <div style="font-size:11px; color:var(--muted); margin-bottom:10px">Edit before starting a new cycle. The adaptive engine uses these as the foundation for all 12 weeks.</div>`;

  for (const ex of exList) {
    h += `<div style="display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:13px; font-weight:700; color:var(--text)">${ex.label}</div>
        <div style="font-size:10px; color:var(--dim)">${ex.note}</div>
      </div>
      <input class="input" type="number" style="width:72px; font-size:16px" value="${state.base1rm[ex.id] || ""}" onchange="update1RM('${ex.id}', this.value)">
      <span style="font-size:11px; color:var(--dim)">kg</span>
    </div>`;
  }

  h += `<button class="btn btn-primary" style="margin-top:12px" onclick="save1RMChanges()">SAVE 1RM CHANGES</button>
  </div>`;

  // New Cycle
  h += `<div class="card">
    <div class="card-header" style="color:var(--warning)">START NEW CYCLE</div>
    <div style="font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px">
      Resets all logs and starts Week 1 fresh with your updated 1RM baseline. Export your data first if you want a backup.
    </div>`;

  if (!state.confirmReset) {
    h += `<button class="btn btn-warning" onclick="setState({confirmReset:true})">START CYCLE ${state.cycle + 1} →</button>`;
  } else {
    h += `<div style="font-size:12px; color:var(--danger); margin-bottom:8px; font-weight:700">⚠ This will permanently clear all session logs. Are you sure?</div>
    <div style="display:flex; gap:8px">
      <button class="btn" style="flex:1" onclick="setState({confirmReset:false})">CANCEL</button>
      <button class="btn btn-danger" style="flex:1" onclick="startNewCycle()">CONFIRM RESET</button>
    </div>`;
  }
  h += `</div>`;

  // Export / Import
  h += `<div class="card">
    <div class="card-header" style="color:${phase.rawAccent}">DATA BACKUP</div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:10px">Export your full training data as JSON, or import a previous backup.</div>
    <div style="display:flex; gap:8px; margin-bottom:8px">
      <button class="btn btn-success" style="flex:1" onclick="exportData()">EXPORT JSON ↓</button>
      <button class="btn" style="flex:1" onclick="document.getElementById('import-file').click()">IMPORT JSON ↑</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>`;

  // Storage info
  h += `<div class="card" style="opacity:0.7">
    <div class="card-header" style="color:var(--muted)">STORAGE INFO</div>
    <div style="font-size:11px; color:var(--dim); line-height:1.6">
      Data is stored in your browser's localStorage. It persists between sessions but is tied to this device and browser. Use Export to create backups.
      <br><br>Logged sessions: ${Object.keys(state.logs).length} · PRs tracked: ${Object.keys(state.prs).length}
    </div>
  </div>`;

  return h;
}

function update1RM(exId, value) {
  state.base1rm[exId] = parseFloat(value) || 0;
}

function save1RMChanges() {
  persist();
  showToast("1RM baselines saved ✓");
}

function startNewCycle() {
  state.logs = {};
  state.prs = {};
  state.week = 1;
  state.cycle += 1;
  state.confirmReset = false;
  persist();
  showToast(`Cycle ${state.cycle} started! 💪`);
}

function exportData() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    cycle: state.cycle,
    base1rm: state.base1rm,
    logs: state.logs,
    prs: state.prs,
    week: state.week
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `scf_backup_cycle${state.cycle}_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("Data exported ✓");
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.logs) state.logs = data.logs;
      if (data.prs) state.prs = data.prs;
      if (data.base1rm) state.base1rm = data.base1rm;
      if (data.cycle) state.cycle = data.cycle;
      if (data.week) state.week = data.week;
      persist();
      showToast("Data imported ✓");
      render();
    } catch (err) {
      showToast("Import failed — invalid JSON");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ─── Init ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
